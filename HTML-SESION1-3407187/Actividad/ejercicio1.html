<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body{
            background-color: rgb(135, 235, 135) ;
        }
        .admin{
        margin: 120px;
        display:block;
        background-color: rgb(135, 235, 135);
            width: 400px;
            height: 400px;
            padding: 30px 20px 5px 40px;
            border-top: black 10px double;
            border-left: rgb(55, 109, 204) 10px solid;
            border-right: purple 10px dashed;
            border-bottom: rgb(0, 242, 255) 3px groove;
        }
    </style>
    <title>Document</title>
</head>
<body>
    <div class="flex items-start">
        <div class="admin">
            pestana CSS
        </div>
    
        <div class="
        m-[120px] 
        block 
        bg-[rgb(135,235,135)] 
        w-[400px] 
        h-[400px] 
        pt-[30px] pr-[20px] pb-[5px] pl-[40px]
        /* Bordes y sus formas */
        border-t-[10px] border-t-black border-double
        border-l-[10px] border-l-[rgb(55,109,204)] border-solid
        border-r-[10px] border-r-purple-600 border-dashed
        /* Para el groove, usamos un valor arbitrario de utilidad */
        border-b-[3px] border-b-[rgb(0,242,255)] [border-bottom-style:groove]
    ">
        <h2 class="text-xl font-bold mb-4">Nuevo Panel Tailwind</h2>
    </div>

    </div>
</body>
</html>
